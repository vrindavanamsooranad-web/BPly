<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/preview-logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="description" content="BPly - A professional blood pressure monitor and tracker for personal and family health management." />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="BPly - Blood Pressure Monitor" />
    <meta property="og:description" content="Track, visualize and share your blood pressure history with family and doctors." />
    <meta property="og:image" content="https://bply.vercel.app/preview-logo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:image" content="https://bply.vercel.app/preview-logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="og:url" content="https://bply.vercel.app" />
    <meta property="og:type" content="website" />
    
    <style>
      body { margin: 0; background-color: #ffffff; }
      @keyframes bply-heartbeat {
        0%, 100% { transform: scale(1); opacity: 1; }
        15% { transform: scale(1.15); opacity: 0.9; }
        30% { transform: scale(1); opacity: 1; }
        45% { transform: scale(1.15); opacity: 0.9; }
        60%, 100% { transform: scale(1); opacity: 1; }
      }
      .splash-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: #ffffff; margin: 0; }
      .splash-logo { animation: bply-heartbeat 1.5s ease-in-out infinite; width: 72px; height: 72px; }
    </style>
    <title>BPly - Blood Pressure Monitor</title>
  </head>
  <body>
    <div id="root">
      <div class="splash-container">
        <svg class="splash-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
          <rect width="32" height="32" rx="7" fill="#2563eb"/>
          <path d="M4 16h4.5l3-8 5.5 16 3.5-10.5 2 4.5H28" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
